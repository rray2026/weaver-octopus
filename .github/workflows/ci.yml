name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Type-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

      - run: pnpm test

  extension-e2e:
    name: Chrome extension e2e (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The e2e suite loads dist/ as an unpacked extension, so build first.
      # `pnpm test:e2e` would also build, but doing it as a separate step
      # makes failures easier to attribute in the CI log.
      - name: Build extension
        run: pnpm --filter @weaver-octopus/chrome-extension build

      - name: Install Playwright browsers
        run: pnpm --filter @weaver-octopus/chrome-extension exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm --filter @weaver-octopus/chrome-extension exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/chrome-extension/playwright-report/
            apps/chrome-extension/test-results/
          retention-days: 7
